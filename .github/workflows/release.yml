name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 读取 package.json 版本
        id: version
        run: |
          NPM_VERSION=$(node -p "require('./package.json').version")
          echo "npm_version=$NPM_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NPM_VERSION" >> $GITHUB_OUTPUT

      - name: 检查 tag 是否已存在
        id: tag_check
        run: |
          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} 已存在，跳过发布"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag ${{ steps.version.outputs.tag }} 不存在，开始发布"
          fi

      - name: Setup Node.js
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: 安装依赖
        if: steps.tag_check.outputs.exists == 'false'
        run: npm ci

      - name: 构建 web 静态资源
        if: steps.tag_check.outputs.exists == 'false'
        run: npm run build:web

      - name: 发布到 npm
        if: steps.tag_check.outputs.exists == 'false'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 创建并推送 tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG=${{ steps.version.outputs.tag }}
          # 本地 tag 若已存在则不重复创建
          git tag "$TAG" 2>/dev/null || true
          # 远程若已有则跳过(避免 rejected 导致整个 job 失败, 进而跳过 release 创建)
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q .; then
            echo "远程 tag $TAG 已存在(可能并发或重跑), 跳过推送"
          else
            git push origin "$TAG"
          fi

      - name: 检查 GitHub Release 是否已存在
        id: release_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=${{ steps.version.outputs.tag }}
          if gh release view "$TAG" --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Release $TAG 已存在, 跳过创建"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Release $TAG 不存在, 将创建"
          fi

      - name: 创建 GitHub Release
        if: steps.release_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
